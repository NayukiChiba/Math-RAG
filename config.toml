# Math-RAG 全局配置（TOML）
#
# 仅保留常用可调项。完整默认值见 src/core/config.py 中的 defaults；
# prompt 模板见 src/core/dataGen/data_gen.py::_default_prompts。

[paths]
raw_dir = "data/raw"
processed_dir = "data/processed"
ocr_dir = "data/processed/ocr"
terms_dir = "data/processed/terms"
chunk_dir = "data/processed/chunk"
evaluation_dir = "data/evaluation"
stats_dir = "data/stats"
outputs_dir = "outputs"
log_base_dir = "outputs/log"
figures_dir = "outputs/figures"
reports_base_dir = "outputs/reports"
rag_results_file = "outputs/rag_results.jsonl"
model_output_json = "data/processed/ma_terms_model.json"


# ── OCR ──────────────────────────────────────────────────────────────
# engine = "local" 使用 pix2text 本地推理；"api" 使用多模态 AI（OpenAI 兼容 Vision API）
[ocr]
engine = "api"
page_start = 0
page_end = -1
skip_existing = true
device = "cuda"
mfr_batch_size = 8
render_dpi = 200
resized_shape = 512
text_contain_formula = true
batch_pages = 10
ocr_workers = 0
max_page_chars = 1800
max_term_len = 16
term_max_tokens = 300
max_pages_per_term = 6

[ocr.api]
api_base = "https://api.deepseek.com/v1"
model = "deepseek-vl2"
api_key_env = "API-KEY-OCR"
max_tokens = 4000
temperature = 0.1
# Vision 提示词（引导模型输出 Markdown + LaTeX）
prompt = """请将图片中的内容完整转录为 Markdown 格式。要求：
1. 保留原始段落结构
2. 所有数学公式使用 LaTeX（行内 $...$，行间 $$...$$）
3. 表格使用 Markdown 表格语法
4. 不要输出其它解释，只输出 Markdown 内容"""


# ── 术语结构化生成（[terms_gen]）─────────────────────────────────────
# engine = "local" 使用本地 HuggingFace 模型；"api" 使用 OpenAI 兼容接口
# prompt 模板已挪到 src/core/dataGen/data_gen.py
[terms_gen]
engine = "api"
local_model_dir = ""
api_base = "https://api.deepseek.com/v1"
model = "deepseek-chat"
api_key_env = "API-KEY-TERMS"
max_tokens = 900
temperature = 0.3
top_p = 0.9
max_attempts = 5
request_timeout = 60
stream = true
min_definition_chars = 40
min_usage_chars = 10
min_applications_chars = 5
min_formula_count = 1
ocr_max_context_chars = 800


# ── RAG 回答生成（[rag_gen]）─────────────────────────────────────────
# engine = "api" 使用 OpenAI 兼容接口；"local" 使用本地 HuggingFace 模型
[rag_gen]
engine = "api"
api_base = "https://api.deepseek.com/v1"
api_model = "deepseek-chat"
api_key_env = "API-KEY-RAG"
api_stream = true
max_context_chars = 6000
max_chars_per_term = 1200
temperature = 0.7
top_p = 0.8
max_new_tokens = 512
local_model_dir = "../Qwen3.5-4B"


# ── 检索 ─────────────────────────────────────────────────────────────
# 向量模型与重排模型：直接填 HuggingFace 模型名（自动下载）或本地目录
[retrieval]
default_vector_model = "BAAI/bge-base-zh-v1.5"
default_reranker_model = "BAAI/bge-reranker-v2-mixed"
# 融合权重（BM25 主导，向量辅助）
bm25_default_weight = 0.7
vector_default_weight = 0.3
# 拒答阈值
out_of_scope_score_threshold = 0.80
no_overlap_strict_score_threshold = 0.88
in_domain_relaxed_score_threshold = 0.45
overlap_min_chars = 2
# 查询改写
rewrite_query_count = 3
rewrite_max_terms = 10
# 评测参数
eval_num_queries = 20
eval_topk = 10
